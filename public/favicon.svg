<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Body -->
  <rect x="8" y="10" width="32" height="28" rx="6" fill="#3b82f6"/>
  <!-- Lighter top section -->
  <rect x="8" y="10" width="32" height="12" rx="6" fill="#60a5fa"/>
  <rect x="8" y="16" width="32" height="6" fill="#60a5fa"/>
  <!-- Divider line -->
  <rect x="8" y="22" width="32" height="2" fill="#2563eb"/>
  <!-- Vertical divider -->
  <rect x="22" y="10" width="2" fill="#2563eb" height="28" rx="0"/>
  <!-- Eyes -->
  <circle cx="17" cy="17" r="3" fill="white"/>
  <circle cx="29" cy="17" r="3" fill="white"/>
  <circle cx="18" cy="16.5" r="1.5" fill="#1e3a5f"/>
  <circle cx="30" cy="16.5" r="1.5" fill="#1e3a5f"/>
  <!-- Smile -->
  <path d="M18 31 Q23 36 28 31" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <rect x="15" y="38" width="5" height="4" rx="2" fill="#2563eb"/>
  <rect x="28" y="38" width="5" height="4" rx="2" fill="#2563eb"/>
  <!-- Antenna / spark -->
  <circle cx="24" cy="5" r="3" fill="#fbbf24"/>
  <rect x="23" y="5" width="2" height="6" fill="#3b82f6"/>
</svg>
